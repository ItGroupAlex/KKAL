<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор калорий</title>
    <style>
        :root {
            --primary: #5c6bc0;
            --primary-hover: #4a59a7;
            --danger: #ef5350;
            --text: #2c3e50;
            --border: #dee2e6;
            --bg: #f8f9fa;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin: 0 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #95a5a6;
        }

        select, input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus { border-color: var(--primary); }

        .btn {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: var(--primary-hover); }

        .btn-delete {
            background: white;
            color: var(--danger);
            border: 1px solid var(--danger);
            margin-top: 15px;
        }
        .btn-delete:hover { background: #fff5f5; }

        .product-list {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 15px;
        }

        .edit-block {
            background: #fcfcfc;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 20px 0;
        }

        .edit-row { display: flex; gap: 10px; }
        .edit-row input { margin-bottom: 0; flex: 1; }
        .edit-row .btn { width: 60px; margin: 0; }

        .total-box {
            text-align: center;
            padding: 15px;
            background: #eef2ff;
            border-radius: 8px;
            margin: 25px 0 15px 0;
        }

        .total-box h3 { margin: 0; color: var(--primary); font-size: 18px; }

        .btn-clear {
            background: none;
            border: none;
            color: #bdc3c7;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-clear:hover { color: #95a5a6; }

        .error-text { color: var(--danger); font-size: 12px; margin-top: -15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧺 Корзина продуктов</h1>

    <form method="post" action="/add_message">
        <label class="section-title">Продукт</label>
        <select name="text">
            {% for product in products %}
                <option value="{{product}}">{{product}}</option>
            {% endfor %}
        </select>

        <label class="section-title">Вес (грамм)</label>
        <input type="text" name="massa" placeholder="Введите вес..." autocomplete="off">
        {% if mes_massa %}<div class="error-text">{{ mes_massa }}</div>{% endif %}

        <button type="submit" class="btn btn-add">Добавить расчет</button>
    </form>

    <div class="product-list">
        <label class="section-title">Список в корзине</label>
        {% for message in messages %}
            <div class="product-item">
                <span>{{ loop.index }}. {{ message.text }} — {{ message.massa }}г</span>
                <b>{{ message.kkal }} ккал</b>
            </div>
        {% endfor %}

        {% if messages %}
            <div class="edit-block">
                <label class="section-title" style="font-size: 10px; margin-bottom: 5px;">Исправить вес последней позиции</label>
                <div class="edit-row">
                    <input type="text" id="put-massa" placeholder="г">
                    <button type="button" class="btn btn-add" onclick="sendPutRequest()">ОК</button>
                </div>
            </div>
            <button class="btn btn-delete" onclick="deleteLast()">🗑 Удалить последнюю позицию</button>
        {% endif %}
    </div>

    <div class="total-box">
        <h3>Итого: {{summa}} ккал</h3>
    </div>

    <form method="POST" action="/logout">
        <button type="submit" class="btn btn-clear">Очистить всё</button>
    </form>
</div>

<script>
    function sendPutRequest() {
        const val = document.getElementById('put-massa').value;
        if(!val) return alert("Введите вес");
        fetch('/update_last', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_massa: val })
        }).then(res => res.ok ? window.location.reload() : alert("Ошибка"));
    }

    function deleteLast() {
        if(confirm("Удалить последнюю запись?")) {
            fetch('/delete_last', { method: 'DELETE' })
            .then(res => res.ok ? window.location.reload() : alert("Пусто"));
        }
    }
</script>

</body>
</html>
